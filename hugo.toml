baseURL = 'https://javierbarbaran.com/'

defaultContentLanguage = "es"
defaultContentLanguageInSubdir = true
title = 'Javier Barbarán'
theme = 'PaperMod'

[languages]

  [languages.en]
    languageName = "English"
    title = "JavierBarbaran.com"
    weight = 1
    contentDir = "content/en"

    [languages.en.params]
      [languages.en.params.homeInfoParams]
        Title = "Javier Barbarán"
        Content = """
<img src="/images/avatar.jpg"
     style="width:120px;height:120px;border-radius:50%;display:block;margin:0 auto 1.5rem;object-fit:cover;" />

Hi, I'm Javier Barbarán — developer and writer. I share ideas, projects and knowledge here. Hope you enjoy it!
"""

    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "Home"
        url = "/en/"
        weight = 1

      [[languages.en.menu.main]]
        name = "Blog"
        url = "/en/posts/"
        weight = 2

      [[languages.en.menu.main]]
        name = "About"
        url = "/en/about/"
        weight = 3

      [[languages.en.menu.main]]
        name = "Search"
        url = "/en/search/"
        weight = 4

      [[languages.en.menu.main]]
        name = "Archive"
        url = "/en/archives/"
        weight = 5

  [languages.es]
    languageName = "Español"
    title = "JavierBarbaran.com"
    weight = 2
    contentDir = "content/es"

    [languages.es.params]
      [languages.es.params.homeInfoParams]
        Title = "Javier Barbarán"
        Content = """
<img src="/images/avatar.jpg"
     style="width:120px;height:120px;border-radius:50%;display:block;margin:0 auto 1.5rem;object-fit:cover;" />

Hola, soy Javier Barbarán, desarrollador y escritor. Comparto ideas, proyectos y conocimientos. ¡Espero que disfrutes el contenido!
"""

    [languages.es.menu]
      [[languages.es.menu.main]]
        name = "Inicio"
        url = "/es/"
        weight = 1

      [[languages.es.menu.main]]
        name = "Blog"
        url = "/es/posts/"
        weight = 2

      [[languages.es.menu.main]]
        name = "Sobre mi"
        url = "/es/about/"
        weight = 3

      [[languages.es.menu.main]]
        name = "Buscar"
        url = "/es/search/"
        weight = 4

      [[languages.es.menu.main]]
        name = "Archivo"
        url = "/es/archives/"
        weight = 5

[params]
  ShowShareButtons = true
  ShowReadingTime = true
  ShowToc = true
  TocOpen = true

  [[params.socialIcons]]
    name = "GitHub"
    url = "https://github.com/jbarbaran"

  [[params.socialIcons]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/javierbarbaran/"

  [[params.socialIcons]]
    name = "Twitter"
    url = "https://x.com/javibarbaran?mx=2"

  [[params.socialIcons]]
    name = "googlescholar"
    url = "https://scholar.google.es/citations?user=S9wf6MgAAAAJ&hl=es"

  [[params.socialIcons]]
    name = "goodreads"
    url = "https://www.goodreads.com/user/show/110068486-javier-barbaran"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false

[outputs]
  home = [ "HTML", "RSS", "JSON" ]

[frontmatter]
  date = [ "date", "publishDate", "lastmod" ]

[markup.goldmark.renderer]
  unsafe = true
